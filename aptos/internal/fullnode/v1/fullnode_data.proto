syntax = "proto3";

package aptos.internal.fullnode.v1;

import "google/protobuf/any.proto";

// Standalone Aptos fullnode proto with all necessary message definitions.
// This avoids complex dependency chains and allows standalone compilation.

// ============================================================================
// Timestamp
// ============================================================================
message Timestamp {
  uint64 seconds = 1;
  uint32 nanos = 2;
}

// ============================================================================
// Transaction and Event types
// ============================================================================
message Transaction {
  uint64 version = 1;
  string hash = 2;
  string sender = 3;
  uint64 sequence_number = 4;
  uint64 max_gas_amount = 5;
  uint64 gas_unit_price = 6;
  repeated Event events = 7;
  TransactionInfo info = 8;
  Timestamp timestamp = 9;
}

message Event {
  string type_str = 1;
  string type = 2;
  google.protobuf.Any data = 3;
}

message TransactionInfo {
  string status = 1;
  uint64 gas_used = 2;
}

// ============================================================================
// Fullnode streaming response types
// ============================================================================
message TransactionsOutput {
  repeated Transaction transactions = 1;
}

message StreamStatus {
  enum StatusType {
    STATUS_TYPE_UNSPECIFIED = 0;
    STATUS_TYPE_INIT = 1;
    STATUS_TYPE_BATCH_END = 2;
  }
  StatusType type = 1;
  uint64 start_version = 2;
  optional uint64 end_version = 3;
}

message GetTransactionsFromNodeRequest {
  optional uint64 starting_version = 1;
  optional uint64 transactions_count = 2;
}

message TransactionsFromNodeResponse {
  oneof response {
    StreamStatus status = 1;
    TransactionsOutput data = 2;
  }
  uint32 chain_id = 3;
}

message FullnodeInfo {
  string chain_id = 1;
  uint64 ledger_version = 2;
}

message PingFullnodeRequest {}

message PingFullnodeResponse {
  optional FullnodeInfo info = 1;
}

// ============================================================================
// gRPC Service
// ============================================================================
service FullnodeData {
  rpc Ping(PingFullnodeRequest) returns (PingFullnodeResponse);
  rpc GetTransactionsFromNode(GetTransactionsFromNodeRequest) returns (stream TransactionsFromNodeResponse);
}
